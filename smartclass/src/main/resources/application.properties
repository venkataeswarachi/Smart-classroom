spring.application.name=smartclass
server.port=4220

spring.datasource.url=jdbc:mysql://localhost:3306/mohan?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=06122004

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# RAG Server Configuration
rag.server.url=http://localhost:8000
rag.server.enabled=true
# Max file size
spring.servlet.multipart.max-file-size=500MB

# Max request size (must be >= max-file-size)
spring.servlet.multipart.max-request-size=500MB

# Optional: increase Tomcat limit
server.tomcat.max-swallow-size=500MB

# Include error messages in responses
server.error.include-message=always